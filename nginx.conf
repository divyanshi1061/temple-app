# Nginx Configuration for Maa Baglamukhi Temple (SSG & Performance Optimized)

server {
    listen 80;
    server_name rudrakshbaglamukhi.com www.rudrakshbaglamukhi.com;
    root /usr/share/nginx/html; # Path to Next.js static exported "out" folder
    index index.html;

    # 1. Enable Gzip Compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_buffers 16 8k;
    gzip_http_version 1.1;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/javascript
        application/x-javascript
        application/json
        application/xml
        application/xml+rss
        image/svg+xml;

    # 2. Cache-Control and Expires Headers
    # Media: images, video, audio, mp3
    location ~* \.(?:jpg|jpeg|gif|png|ico|cur|gz|svg|svgz|mp4|ogg|ogv|webm|htc|mp3)$ {
        expires 1y;
        access_log off;
        add_header Cache-Control "public, no-transform";
    }

    # CSS and Javascript
    location ~* \.(?:css|js)$ {
        expires 1y;
        access_log off;
        add_header Cache-Control "public, no-transform";
    }

    # WebFonts
    location ~* \.(?:ttf|ttc|otf|eot|woff|woff2)$ {
        expires 1y;
        access_log off;
        add_header Cache-Control "public, no-transform";
        add_header Access-Control-Allow-Origin "*";
    }

    # 3. Clean URLs for Next.js Static Export
    location / {
        try_files $uri $uri.html $uri/ /index.html;
    }

    error_page 404 /404.html;
    location = /404.html {
        internal;
    }
}
